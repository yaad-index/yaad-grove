name: docker-publish

# Builds and publishes the image(s) to GHCR on a release tag only (release-please
# cuts the tag; see release-please.yml). It must NOT run on every main push.
#
# Per-backend variants (like golang's bookworm/alpine tags): each matrix row
# builds one Dockerfile and appends a tag suffix via the metadata `flavor`.
#   - default (memory, distroless, pure-Go)  -> :X.Y.Z          (no suffix)
#   - ladybug (persistent, debian-slim, cgo) -> :X.Y.Z-ladybug
# Add a new backend by adding a matrix row (e.g. sqlite-vec, #119).
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            suffix: ""
          - dockerfile: Dockerfile.ladybug
            suffix: "-ladybug"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/yaad-index/yaad-grove
          # suffix appends to every generated tag, so the default variant emits
          # 0.15.0 / 0.15 / 0 / latest and the ladybug variant emits the same set
          # with a -ladybug suffix (0.15.0-ladybug ... latest-ladybug), mirroring
          # golang's bookworm/alpine variant tags.
          flavor: |
            suffix=${{ matrix.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
