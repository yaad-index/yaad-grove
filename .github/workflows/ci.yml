name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Track the version pinned in go.mod (currently Go 1.26) so CI and the
          # module stay in lockstep — single source of truth.
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pin the linter version so CI matches the local run (same reasoning as
          # go-version-file above); Dependabot bumps it deliberately.
          version: v2.11.4

      - name: Test
        # -race is the house default; harmless now (no tests yet) and ready for
        # the concurrent transport/gate code Phase 1 brings.
        run: go test -race ./...
