# fa.yaml — Persian language pack (ADR 0018), the second sample.
#
# It overlays the base (en): it sets only what differs. Every key it omits inherits
# from en, so a pack states only what it translates.
#
# NOTE: the `strings` below are a FIRST-PASS translation scaffold — pending a native
# Persian review/rewrite (هکسره, نیم‌فاصله/ZWNJ, register) by the pack's native-speaker
# author before this ships as the reference fa pack.
code: fa
name: فارسی
prompt: |
  Answer in Persian (فارسی) unless the user writes to you in another language, in
  which case reply in that language. Use natural, conversational Persian.
strings:
  consent_disclosure_intro: |-
    قبل از اینکه شما را اضافه کنم، معنی پیوستن این است:
    • در گروه، وقتی به من پاسخ دهید یا مرا @منشن کنید، جوابتان را می‌دهم.
    • پیام‌های گروهی شما به پایگاه دانشی که از آن پاسخ می‌دهم افزوده می‌شوند.
  consent_transcript_line: "\n• پیام‌های شما در یک سابقه‌ی گفت‌وگوی ماندگار هم نگه داشته می‌شوند. با انصراف، ثبت پیام‌های تازه متوقف می‌شود اما پیام‌های پیشین باقی می‌مانند."
  consent_disclosure_tap: "\nبرای پیوستن، دکمه‌ی زیر را بزنید (یا /consent بفرستید). هر زمان بخواهید می‌توانید با /consent remove انصراف دهید."
  consent_granted: "پیوستید — ممنون. هر زمان بخواهید می‌توانید با /consent remove انصراف دهید."
  consent_already: "شما قبلاً پیوسته‌اید. برای انصراف /consent remove بفرستید."
  consent_removed: "انصراف شما ثبت شد — دیگر پیام‌هایتان را ثبت نمی‌کنم و به شما پاسخ نمی‌دهم. برای پیوستن دوباره هر زمان /consent بفرستید."
  consent_error: "مشکلی پیش آمد — لطفاً دوباره تلاش کنید."
  consent_opt_in_label: "پیوستن"
  nudge: "برای گفت‌وگو با من اینجا، اول بپیوندید: به من پیام خصوصی بدهید و دکمه‌ی پیوستن را بزنید (یا /consent بفرستید)."
  refuse: "ببخشید، اینجا نمی‌توانم در این مورد کمکی کنم."
  rate_limited: "به سقف تعداد پیام رسیدید — لطفاً کمی بعد دوباره تلاش کنید."
  at_capacity: "الان ظرفیت ندارم — لطفاً کمی بعد دوباره تلاش کنید."
  callback_done: "انجام شد ✓"
  callback_expired: "این کنش منقضی شده است."
  callback_consumed: "قبلاً انجام شده است."
  callback_error: "مشکلی پیش آمد — لطفاً دوباره تلاش کنید."
  callback_denied: "شما اجازه‌ی این کار را ندارید."
  callback_unknown_verb: "این کنش دیگر در دسترس نیست."
  callback_invalid: "این کنش به این شکل قابل انجام نیست."
  callback_failed: "انجام نشد — لطفاً دوباره تلاش کنید."
