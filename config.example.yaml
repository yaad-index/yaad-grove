# yaad-grove example configuration.
#
# Config layers as file < env < flag. Copy to config.yaml (git-ignored) or
# /etc/yaad-grove/config.yaml and adjust. Secrets are NOT set here — they come
# from the environment:
#   YAADGROVE_MODEL_API_KEY    OpenAI-compatible API key
#   YAADGROVE_TELEGRAM_TOKEN   Telegram bot token

log-level: info

serve:
  # Curated vault the bot grounds on (markdown + YAML frontmatter). This is the
  # answering source of truth — never the quarantined chatter log.
  vault-dir: ./vault

  # Scope statement / system prompt that bounds the bot and drives refusal.
  # Keep it specific: it is half of the grounding guarantee.
  scope: >
    You answer questions about <this community> using only the provided vault
    context and tool results. If something is outside that scope, say so and
    decline rather than guessing.

  # OpenAI-compatible model endpoint. Any compatible gateway works.
  model-base-url: https://api.openai.com/v1
  model-name: gpt-4o-mini

  # Language pack (issue #65 / ADR 0018): selects the language whose prompt
  # guidance is layered into the system prompt (e.g. "answer in Persian"). Built-in
  # packs (en, fa, …) ship embedded in the binary; a new language is a PR adding
  # langpacks/<code>.yaml. Default "en" is the base and adds nothing. Follow-up
  # detection is language-neutral (a recency signal), so packs carry no follow-up
  # terms. An external directory can add/override packs beyond the embedded ones.
  # language: fa
  # langpacks-dir: /etc/yaad-grove/langpacks

  # Retrieval mode (issue #65): how lexical + semantic retrieval combine.
  #   keyword  — lexical only (the zero-config default when no embeddings are set)
  #   semantic — embeddings, with keyword as an error-fallback (prior default)
  #   hybrid   — RRF fusion of both, run every query (best quality)
  # Left unset it defaults to hybrid when embeddings are configured, else keyword.
  # 'semantic' and 'hybrid' require the embedding endpoint below. Hybrid runs the
  # lexical leg every query, so exact-name / "which episode" queries (semantic's
  # blind spot) are matched lexically even when the semantic leg clears nothing.
  # retrieval-mode: hybrid
  #
  # Embedding endpoint for semantic/hybrid retrieval (OpenAI-compatible /embeddings).
  # Both must be set together; the key comes from YAADGROVE_EMBEDDING_API_KEY
  # (falling back to YAADGROVE_MODEL_API_KEY).
  # embedding-base-url: http://localhost:11434/v1
  # embedding-model: bge-m3
  # similarity-threshold: 0.30   # semantic cosine floor (gates only the semantic leg)

  # Global spend ceiling — the hard cost backstop (ADR 0006). A token budget the
  # model-call path consults before every call; when it is reached, calls are
  # refused (not queued) until the window resets. This is the outer bound the
  # per-user rate limit defers to. The meter is persisted (budget-db) so a restart
  # cannot reset it. Defaults are deliberately conservative so the bot is
  # cost-capped out of the box — raise spend-ceiling to your real budget. A
  # non-positive value is refused (cost-safety cannot be turned off by zeroing it).
  spend-ceiling: 1000000    # max tokens per spend-period
  spend-period: 24h         # window the ceiling accumulates over, then resets
  budget-db: ./budget.db    # persisted spend-meter (survives restarts)

  # Tier applied to users without a per-user override.
  default-tier: default

  # Telegram group chat ids that count as "the community" the bot serves.
  # Membership in one of these groups is the access boundary for the group
  # surface (DMs are gated separately by admin approval).
  telegram-allowed-groups: []

  # Forum topic scoping (issue #98): restrict a forum group to specific topics.
  # Each entry is 'chatid=topicid1,topicid2' — the bot answers ONLY in those
  # topics of that group and stays silent in the rest. A group not listed here is
  # answered in all its topics (today's behavior). Replies always land in the
  # topic the question was asked in, regardless of this list.
  # telegram-allowed-topics: ["-1001234567890=2,7"]

  # Conversation transcript (ADR 0015): a durable, role-tagged record of group
  # conversations — human turns AND the bot's own answers — for operator review
  # and answer-quality evaluation. It is a directory holding one append-only
  # <chat-id>.jsonl per chat, kept SEPARATE from the quarantine log and never read
  # by the answering or curation path (so recording the bot's answers can't drift
  # the vault). Withdrawal is prospective: /consent remove stops new entries but
  # keeps past ones; the opt-in disclosure states this when a transcript is active.
  # Empty (the default) disables it. When set, the directory is created and
  # validated writable at startup.
  transcript-log: ""

# --- Planned config (Phase 1 build; not yet read by the scaffold) ---
#
# tools:                 # external MCP servers whose tools this bot may call
#   - name: example
#     command: some-mcp-server
#     args: ["--flag"]
#
# Per-server tool allow/deny (issue #87): expose only the tools an instance needs.
# A read-only Q&A bot should drop a server's write or identity-requiring tools
# (e.g. ones that need a username the model would otherwise hallucinate). Filtering
# happens at enumeration, so a dropped tool is neither advertised to the model nor
# callable. Use an allow-list (exclusive — everything else dropped, closed by
# default) OR a deny-list (subtractive) per server, not both.
#   mcp-allow: ["example=search,lookup"]     # expose ONLY these
#   mcp-deny:  ["example=write_thing"]        # expose all EXCEPT these
#
# admins: ["<platform-user-id>"]         # who may configure the bot live
