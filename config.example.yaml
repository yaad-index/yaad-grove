# yaad-grove example configuration.
#
# Config layers as file < env < flag. Copy to config.yaml (git-ignored) or
# /etc/yaad-grove/config.yaml and adjust. Secrets are NOT set here — they come
# from the environment:
#   YAADGROVE_MODEL_API_KEY    OpenAI-compatible API key
#   YAADGROVE_TELEGRAM_TOKEN   Telegram bot token

log-level: info

serve:
  # Curated vault the bot grounds on (markdown + YAML frontmatter). This is the
  # answering source of truth — never the quarantined chatter log.
  vault-dir: ./vault

  # Scope statement / system prompt that bounds the bot and drives refusal.
  # Keep it specific: it is half of the grounding guarantee.
  scope: >
    You answer questions about <this community> using only the provided vault
    context and tool results. If something is outside that scope, say so and
    decline rather than guessing.

  # OpenAI-compatible model endpoint. Any compatible gateway works.
  model-base-url: https://api.openai.com/v1
  model-name: gpt-4o-mini

  # Global spend ceiling — the hard cost backstop (ADR 0006). A token budget the
  # model-call path consults before every call; when it is reached, calls are
  # refused (not queued) until the window resets. This is the outer bound the
  # per-user rate limit defers to. The meter is persisted (budget-db) so a restart
  # cannot reset it. Defaults are deliberately conservative so the bot is
  # cost-capped out of the box — raise spend-ceiling to your real budget. A
  # non-positive value is refused (cost-safety cannot be turned off by zeroing it).
  spend-ceiling: 1000000    # max tokens per spend-period
  spend-period: 24h         # window the ceiling accumulates over, then resets
  budget-db: ./budget.db    # persisted spend-meter (survives restarts)

  # Tier applied to users without a per-user override.
  default-tier: default

  # Telegram group chat ids that count as "the community" the bot serves.
  # Membership in one of these groups is the access boundary for the group
  # surface (DMs are gated separately by admin approval).
  telegram-allowed-groups: []

  # Conversation transcript (ADR 0015): a durable, role-tagged record of group
  # conversations — human turns AND the bot's own answers — for operator review
  # and answer-quality evaluation. It is a directory holding one append-only
  # <chat-id>.jsonl per chat, kept SEPARATE from the quarantine log and never read
  # by the answering or curation path (so recording the bot's answers can't drift
  # the vault). Withdrawal is prospective: /consent remove stops new entries but
  # keeps past ones; the opt-in disclosure states this when a transcript is active.
  # Empty (the default) disables it. When set, the directory is created and
  # validated writable at startup.
  transcript-log: ""

